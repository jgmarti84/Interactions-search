options:
  ligand_plot: 'Yes'
  vmd_output: 'Yes'
  cumulative_output: 'Yes'   # agrega cada par receptor-ligando a Interactions_close.csv y CM_all.csv
  interaction_coord: 'center'   # coordenada X,Y,Z que se agrega a los CSV de interacciones
                                 # (_all/_threshold/_true): 'receptor', 'ligand' o 'center' (punto medio)
  volume_plot: 'Yes'            # genera un PNG de dispersión 3D (átomos + vértices de la
                                 # envolvente convexa) del sitio activo completo y de cada
                                 # pocket hidrofóbico validado
  bias: 'No'                    # genera <rec>_<lig>.bpf (bias probe file para GOLD) y
                                 # <rec>_<lig>_bias.pdb (mismos puntos, dummy atoms para ver en VMD)
                                 # con los aceptores/donores/centroides de anillos aromáticos del ligando
  bias_validated_only: 'No'     # 'No' (default): todos los hot-points químicos del ligando.
                                 # 'Yes': solo los que forman una interacción validada (Interaction == 'Yes')

distancias:
  Distances_Hidrogen_Bonds: 3.2
  Distances_Aromatic: 5.5
  Distances_Hidrofobica: 4.0
  centroid_distance: 12   # Å — radio de búsqueda del sitio activo (ahora sí se usa)
  Distances_C_Simple : 1.54
  Distances_C_Doble : 2.56

angulos:
  Angle_Hidrogen_Bonds_Min: 100   # ° — ángulo mínimo Donor-Aceptor-Antecedente
  Angle_Hidrogen_Bonds_Max: 180   # ° — tope real: angle_three_points nunca supera 180°

aromaticidad:
  Ring_Planarity_RMSD_Max: 0.15   # Å — RMSD máximo al plano de mejor ajuste para
                                  # considerar un anillo aromático (real ~0.01, silla ~0.25)

pockets:
  min_residues: 3            # mínimo de residuos distintos contactando el mismo fragmento del ligando
  coverage_threshold: 0.5    # R (0-1) del vector resultante normalizado; R bajo = residuos distribuidos
                              # alrededor del fragmento (pocket real), R alto = todos del mismo lado
  density_radius: 5.0        # Å — radio de vecindad para Density_Score (densidad hidrofóbica local
                              # estilo fpocket); más alto = cuenta vecinos más lejos, score más suave

